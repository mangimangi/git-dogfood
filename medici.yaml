prefix: gdf
description: "Automated install-on-release to self-install repo-embedded software via GitHub workflows"
docs: [AGENTS.md, README.md, docs/]
eval:
  threshold: 80
providers:
  issues:
    name: pearls
    config: "prl configure"
    docs: "prl docs"
  docs:
    name: repo
    docs: "cat docs/README.md"
